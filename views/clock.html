<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reloj - Simulador de Reemplazo de Páginas</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/clock.css" />
</head>
<body>
  <main class="container">
    <header class="header-panel">
      <div>
        <p class="eyebrow">Reloj</p>
        <h1>Simulador Clock</h1>
        <p class="help-text">El algoritmo del reloj utiliza un puntero circular que revisa el bit R de forma cíclica para decidir la víctima.</p>
      </div>
      <div>
        <a class="secondary-button" href="../index.html">Volver al inicio</a>
      </div>
    </header>

    <div class="page-shell">
      <section class="panel workspace">
        <div class="control-panel">
          <button id="simulate-btn" class="primary">Ejecutar Paso a Paso</button>
          <button id="next-btn">Siguiente Simulación (Preservar RAM)</button>
          <button id="reorganize-btn" class="secondary-button">Reorganizar RAM</button>
        </div>
        <div class="info-box" id="incoming-label"></div>
        <div id="clock-ring"></div>
      </section>

      <aside class="panel">
        <h2>Consola de Logs</h2>
        <div class="log-console" id="log-console"></div>
        <button class="clear-logs-btn" id="clear-logs-btn">Limpiar Logs</button>
        <div class="result-tab" id="result-tab">
          <div class="result-tab-header">Resultado de reemplazo</div>
          <div class="result-content" id="result-content"></div>
        </div>
      </aside>
    </div>
  </main>

  <script type="module">
    import { createApp } from '../js/app.js';
    createApp('clock');
  </script>
</body>
</html>
